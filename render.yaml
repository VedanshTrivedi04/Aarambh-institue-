services:
  # 1. PostgreSQL Database
  - type: pgo
    name: aarambh-db
    plan: free

  # 2. Redis for Background Tasks/Cache
  - type: redis
    name: aarambh-redis
    plan: free
    maxmemoryPolicy: noeviction

  # 3. Django Backend
  - type: web
    name: aarambh-backend
    env: python
    rootDir: backend/aarambh_backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "uvicorn config.asgi:application --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aarambh-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aarambh-redis
          property: connectionString
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://aarambh-frontend.onrender.com"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_REGION_NAME
        sync: false

  # 4. Vite React Frontend
  - type: web
    name: aarambh-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        value: "https://aarambh-backend.onrender.com/api/v1"
